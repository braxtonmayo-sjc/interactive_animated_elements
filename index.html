<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐇Hoppy Easter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="hero">
      <h1>🐇 Hoppy Easter 🐇</h1>
      <p>
        Hope you have a very Happy Easter!
      </p>
    </header>

    <main>
      <section class="easter-gallery">
        <div class="card egg">
          <img class="easter-egg" src="assets/images/Egg.png" alt="Easter Egg" />
          <p>Hover over the egg to watch it glow!</p>
        </div>
        <div class="card bunny">
          <img src="assets/images/Bunny.png" alt="Bunny" />
          <p>The bunny hops up and down!</p>
        </div>
        <div class="card chick">
          <img src="assests/images/Chick.png" alt="Chick" />
          <p>The chick jiggles!</p>
        </div>
      </section>

      <section class="cta">
        <button class="btn">Send Easter Wishes 🐣</button>
      </section>
    </main>

    <footer>
      <p>🐇 2026 Braxton Mayo
       | Web Design I - Week 11 🐣</p>
    </footer>
  </body>
</html>
